<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>For Potti 💜</title>
  <meta name="description" content="Last college days anniversary — a tiny website with a big question." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell" id="app" aria-live="polite">
    <header class="top">
      <div class="mark" aria-hidden="true"></div>
      <div class="top__text">
        <div class="kicker" id="kicker">Last college days anniversary.</div>
        <h1 class="title" id="title">For Potti</h1>
      </div>
      <button class="ghost" id="soundBtn" type="button" title="Toggle sound">
        ♪ <span id="soundState">off</span>
      </button>
    </header>

    <section class="card stage" id="stage" aria-label="main content">
      <!-- injected by JS -->
    </section>

    <footer class="foot">
      <div class="hint" id="hint"></div>
      <div class="dots" id="dots" aria-label="progress steps"></div>
    </footer>
  </main>

  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <script src="./script.js"></script>
</body>
</html>
